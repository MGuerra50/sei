<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Simões Engenharia & Interiores — projetos residenciais e comerciais com engenharia de precisão e design exclusivo." />
  <title>Simões Engenharia & Interiores</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #0a0c0f;
      --bg-elevated: rgba(14, 16, 20, 0.55);
      --text: #f4f2ee;
      --text-muted: rgba(244, 242, 238, 0.68);
      --line: rgba(244, 242, 238, 0.14);
      --accent: #c4a574;
      --radius-sm: 0.75rem;
      --radius-pill: 999px;
      --header-h: 4.5rem;
      --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
      --max: 92rem;
      --gutter: clamp(1rem, 3.5vw, 3.5rem);
      /* Enquadramento idêntico para imagem 1 e 2 (efeito 2.5D) */
      --scene-fit: cover;
      --scene-pos: center center;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
      -webkit-text-size-adjust: 100%;
    }

    body {
      font-family: "Outfit", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      overflow-x: hidden;
      min-height: 100dvh;
    }

    img {
      display: block;
      max-width: 100%;
      height: auto;
      user-select: none;
      -webkit-user-drag: none;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      font: inherit;
      color: inherit;
      background: none;
      border: none;
      cursor: pointer;
    }

    .hero {
      position: relative;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      isolation: isolate;
      overflow: clip;
    }

    /* ——— Camadas 2.5D: bg (1) → texto → fg (2) ——— */
    .hero__scene {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .hero__scene picture {
      display: block;
      width: 100%;
      height: 100%;
    }

    .hero__scene img {
      width: 100%;
      height: 100%;
      max-width: none;
      object-fit: var(--scene-fit);
      object-position: var(--scene-pos);
    }

    .hero__bg {
      z-index: 1;
    }

    .hero__veil {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(8, 10, 14, 0.45) 0%, rgba(8, 10, 14, 0.12) 32%, rgba(8, 10, 14, 0.35) 68%, rgba(8, 10, 14, 0.88) 100%),
        linear-gradient(90deg, rgba(8, 10, 14, 0.62) 0%, rgba(8, 10, 14, 0.18) 45%, rgba(8, 10, 14, 0.08) 100%);
    }

    .hero__brand {
      position: absolute;
      left: var(--gutter);
      top: clamp(12%, 18vh, 22%);
      z-index: 3;
      width: 55%;
      max-width: 55%;
      text-align: left;
      pointer-events: none;
      user-select: none;
      container-type: inline-size;
      container-name: brand;
    }

    .hero__fg {
      z-index: 4;
    }

    /* ——— Header ——— */
    .header {
      position: relative;
      z-index: 30;
      height: var(--header-h);
      display: flex;
      align-items: center;
      padding: 0 var(--gutter);
    }

    .header__inner {
      width: min(100%, var(--max));
      margin-inline: auto;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 1rem;
    }

    .logo {
      font-family: "Syne", sans-serif;
      font-weight: 700;
      font-size: clamp(1rem, 1.2vw, 1.15rem);
      letter-spacing: 0.04em;
      justify-self: start;
    }

    .logo span {
      font-weight: 400;
      opacity: 0.55;
      margin-left: 0.35rem;
      font-size: 0.72em;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .nav {
      display: none;
      align-items: center;
      gap: 0.15rem;
      padding: 0.4rem 0.55rem;
      border: 1px solid var(--line);
      border-radius: var(--radius-pill);
      background: rgba(10, 12, 15, 0.35);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .nav a {
      font-size: 0.8rem;
      font-weight: 400;
      letter-spacing: 0.02em;
      padding: 0.55rem 0.95rem;
      border-radius: var(--radius-pill);
      opacity: 0.78;
      transition: opacity 0.25s var(--ease-out), background 0.25s var(--ease-out);
    }

    .nav a:hover,
    .nav a:focus-visible {
      opacity: 1;
      background: rgba(255, 255, 255, 0.06);
      outline: none;
    }

    .header__actions {
      justify-self: end;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .contact {
      position: relative;
      display: none;
    }

    .contact__trigger {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.01em;
      opacity: 0.88;
      padding: 0.4rem 0.55rem;
      border-radius: var(--radius-pill);
      transition: opacity 0.25s var(--ease-out), background 0.25s var(--ease-out);
    }

    .contact__trigger:hover,
    .contact__trigger:focus-visible {
      opacity: 1;
      background: rgba(255, 255, 255, 0.06);
      outline: none;
    }

    .contact__trigger[aria-expanded="true"] {
      opacity: 1;
      background: rgba(255, 255, 255, 0.08);
    }

    .contact__trigger svg {
      width: 1rem;
      height: 1rem;
      flex-shrink: 0;
    }

    .contact__dropdown {
      position: absolute;
      top: calc(100% + 0.55rem);
      right: 0;
      min-width: 13.5rem;
      padding: 0.85rem 1rem;
      border: 1px solid rgba(244, 242, 238, 0.16);
      border-radius: 0.85rem;
      background: rgba(12, 14, 18, 0.92);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.35);
      opacity: 0;
      visibility: hidden;
      transform: translateY(-6px);
      transition: opacity 0.2s var(--ease-out), transform 0.2s var(--ease-out), visibility 0.2s;
      z-index: 50;
    }

    .contact__dropdown.is-open {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .contact__dropdown-label {
      display: block;
      font-size: 0.7rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      opacity: 0.55;
      margin-bottom: 0.35rem;
    }

    .contact__dropdown a {
      display: block;
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.01em;
      transition: opacity 0.2s;
    }

    .contact__dropdown a:hover,
    .contact__dropdown a:focus-visible {
      opacity: 0.75;
      outline: none;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.65rem;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.01em;
      white-space: nowrap;
      transition: transform 0.3s var(--ease-out), background 0.3s var(--ease-out), color 0.3s var(--ease-out), border-color 0.3s var(--ease-out);
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }

    .btn--ghost {
      padding: 0.65rem 1.15rem;
      border: 1px solid rgba(244, 242, 238, 0.35);
      border-radius: var(--radius-pill);
      background: rgba(10, 12, 15, 0.25);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .btn--ghost:hover {
      background: rgba(244, 242, 238, 0.08);
      border-color: rgba(244, 242, 238, 0.55);
    }

    .btn--solid {
      padding: 0.85rem 0.85rem 0.85rem 1.35rem;
      border-radius: var(--radius-pill);
      background: var(--text);
      color: #111;
    }

    .btn--solid:hover {
      background: #fff;
    }

    .btn__icon {
      display: grid;
      place-items: center;
      width: 1.85rem;
      height: 1.85rem;
      border-radius: 50%;
      background: #111;
      color: #fff;
      flex-shrink: 0;
    }

    .btn__icon svg {
      width: 0.85rem;
      height: 0.85rem;
    }

    .menu-toggle {
      display: grid;
      place-items: center;
      width: 2.5rem;
      height: 2.5rem;
      border: 1px solid var(--line);
      border-radius: 50%;
      background: rgba(10, 12, 15, 0.35);
      backdrop-filter: blur(10px);
    }

    .menu-toggle span,
    .menu-toggle span::before,
    .menu-toggle span::after {
      display: block;
      width: 1rem;
      height: 1.5px;
      background: var(--text);
      border-radius: 2px;
      position: relative;
      transition: transform 0.3s var(--ease-out), opacity 0.3s;
    }

    .menu-toggle span::before,
    .menu-toggle span::after {
      content: "";
      position: absolute;
      left: 0;
    }

    .menu-toggle span::before { top: -5px; }
    .menu-toggle span::after { top: 5px; }

    .menu-toggle[aria-expanded="true"] span {
      background: transparent;
    }

    .menu-toggle[aria-expanded="true"] span::before {
      top: 0;
      transform: rotate(45deg);
    }

    .menu-toggle[aria-expanded="true"] span::after {
      top: 0;
      transform: rotate(-45deg);
    }

    .mobile-nav {
      position: absolute;
      top: var(--header-h);
      left: var(--gutter);
      right: var(--gutter);
      z-index: 40;
      display: none;
      flex-direction: column;
      gap: 0.25rem;
      padding: 1rem;
      border: 1px solid var(--line);
      border-radius: 1rem;
      background: rgba(12, 14, 18, 0.92);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .mobile-nav.is-open {
      display: flex;
    }

    .mobile-nav a {
      padding: 0.85rem 1rem;
      border-radius: 0.65rem;
      font-size: 0.95rem;
      opacity: 0.85;
    }

    .mobile-nav a:hover {
      background: rgba(255, 255, 255, 0.05);
      opacity: 1;
    }

    /* ——— Stage (copy ancorado na hero inteira) ——— */
    .hero__stage {
      position: absolute;
      inset: 0;
      z-index: 10;
      pointer-events: none;
    }

    .hero__grow {
      flex: 1;
      min-height: 0;
      pointer-events: none;
    }

    .reveal {
      overflow: hidden;
      display: block;
      line-height: 0.9;
    }

    .reveal__inner {
      display: block;
      will-change: transform;
    }

    .hero__brand-text {
      font-family: "Syne", sans-serif;
      font-weight: 800;
      font-size: clamp(2.5rem, 15cqw, 14rem);
      letter-spacing: -0.04em;
      line-height: 0.85;
      color: rgba(255, 255, 255, 0.96);
      text-transform: uppercase;
      white-space: nowrap;
      display: block;
      width: 100%;
    }

    .hero__copy {
      position: absolute;
      left: var(--gutter);
      top: 50%;
      transform: translateY(-50%);
      z-index: 25;
      max-width: min(34rem, 40vw);
      margin: 0;
      padding: 0;
      pointer-events: auto;
      text-align: left;
    }

    .hero__title {
      font-family: "Syne", sans-serif;
      font-weight: 700;
      font-size: clamp(1.55rem, 3.2vw, 2.65rem);
      line-height: 1.15;
      letter-spacing: -0.02em;
      margin-bottom: 1.35rem;
    }

    .hero__title .reveal {
      line-height: 1.15;
    }

    .hero__title .reveal__inner {
      white-space: nowrap;
    }

    /* ——— Feature strip ——— */
    .features {
      position: relative;
      z-index: 20;
      width: min(100%, var(--max));
      margin-left: auto;
      margin-right: 0;
      padding: 0 var(--gutter) clamp(1.25rem, 2.5vw, 2rem);
      box-sizing: border-box;
    }

    .features__track {
      display: grid;
      grid-template-columns: 1fr;
      gap: clamp(0.55rem, 0.9vw, 0.85rem);
    }

    .feature {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0;
      aspect-ratio: 320 / 300;
      width: 100%;
      max-height: min(17.5rem, 26vh);
      min-height: 0;
      height: auto;
      padding: clamp(1.15rem, 1.6vw, 1.65rem);
      border: 1px solid rgba(244, 242, 238, 0.16);
      border-radius: clamp(0.9rem, 1.2vw, 1.15rem);
      background: rgba(12, 14, 18, 0.28);
      backdrop-filter: blur(28px) saturate(1.15);
      -webkit-backdrop-filter: blur(28px) saturate(1.15);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
      transition: border-color 0.3s var(--ease-out), background 0.3s var(--ease-out), transform 0.3s var(--ease-out);
      text-align: left;
    }

    .feature:hover {
      border-color: rgba(244, 242, 238, 0.3);
      background: rgba(12, 14, 18, 0.38);
      transform: translateY(-2px);
    }

    .feature:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .feature__icon {
      width: clamp(1.25rem, 1.4vw, 1.45rem);
      height: clamp(1.25rem, 1.4vw, 1.45rem);
      margin-bottom: clamp(0.85rem, 1.4vw, 1.25rem);
      opacity: 0.95;
      flex-shrink: 0;
    }

    .feature__icon svg {
      width: 100%;
      height: 100%;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .feature__body {
      flex: 1;
      min-height: 0;
    }

    .feature__body h3 {
      font-family: "Syne", sans-serif;
      font-size: clamp(0.95rem, 1.15vw, 1.1rem);
      font-weight: 600;
      letter-spacing: -0.01em;
      margin-bottom: 0.45rem;
      line-height: 1.25;
    }

    .feature__body p {
      font-size: clamp(0.75rem, 0.95vw, 0.88rem);
      font-weight: 300;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .feature__more {
      align-self: flex-end;
      margin-top: auto;
      display: grid;
      place-items: center;
      width: 1.85rem;
      height: 1.85rem;
      border-radius: 50%;
      border: 1px solid rgba(244, 242, 238, 0.32);
      transition: background 0.25s, border-color 0.25s;
      flex-shrink: 0;
    }

    .feature:hover .feature__more {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(244, 242, 238, 0.55);
    }

    .features__nav {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin-top: 0.85rem;
    }

    .features__btn {
      display: grid;
      place-items: center;
      width: 2.6rem;
      height: 2.6rem;
      border-radius: 50%;
      border: 1px solid rgba(244, 242, 238, 0.35);
      background: rgba(12, 14, 18, 0.45);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: var(--text);
      transition: background 0.25s var(--ease-out), border-color 0.25s var(--ease-out), opacity 0.25s var(--ease-out), transform 0.25s var(--ease-out);
    }

    .features__btn svg {
      width: 1rem;
      height: 1rem;
    }

    .features__btn:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(244, 242, 238, 0.55);
      transform: scale(1.04);
    }

    .features__btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .features__dots {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .features__dot {
      width: 0.4rem;
      height: 0.4rem;
      border-radius: 50%;
      border: none;
      padding: 0;
      background: rgba(244, 242, 238, 0.3);
      transition: background 0.25s, transform 0.25s, width 0.25s;
    }

    .features__dot.is-active {
      width: 1.1rem;
      border-radius: 999px;
      background: rgba(244, 242, 238, 0.9);
    }

    /* ——— Responsive ——— */
    @media (min-width: 640px) {
      .features__track {
        grid-template-columns: 1fr 1fr;
      }

      .contact {
        display: block;
      }

      .menu-toggle {
        display: none;
      }

      .btn--header {
        display: inline-flex;
      }
    }

    @media (min-width: 900px) {
      .nav {
        display: flex;
      }

      .mobile-nav,
      .mobile-nav.is-open {
        display: none !important;
      }

      .hero__copy {
        max-width: min(40rem, 42vw);
      }

      .features__track {
        grid-template-columns: repeat(4, 1fr);
        gap: clamp(0.6rem, 0.9vw, 0.85rem);
      }
    }

    @media (min-width: 1200px) {
      .hero__brand {
        top: clamp(10%, 14vh, 18%);
      }
    }

    /* Ultrawide: contain composition, keep full-bleed bg */
    @media (min-width: 1600px) {
      .hero__copy {
        max-width: 42rem;
      }
    }

    @media (min-width: 2200px) {
      :root {
        --max: 110rem;
      }
    }

    /* Mobile: mantém imagens alinhadas; ajusta tipografia e copy */
    @media (max-width: 899px) {
      :root {
        --scene-pos: 62% center;
      }

      .hero__brand {
        top: clamp(8%, 12vh, 16%);
      }

      .hero__copy {
        max-width: min(22rem, calc(100% - 2 * var(--gutter)));
        top: 50%;
        transform: translateY(-50%);
      }

      .hero__title {
        font-size: clamp(1.35rem, 5.5vw, 1.85rem);
      }

      .hero__title .reveal__inner {
        white-space: normal;
      }

      .features {
        width: 100%;
        margin-left: 0;
        margin-right: 0;
      }

      .btn--header {
        display: none;
      }
    }

    @media (max-width: 639px) {
      .header__inner {
        grid-template-columns: 1fr auto;
      }

      .features__track {
        display: flex;
        overflow-x: auto;
        scroll-snap-type: x mandatory;
        gap: 0.65rem;
        padding-bottom: 0.35rem;
        margin-inline: calc(var(--gutter) * -0.15);
        padding-inline: calc(var(--gutter) * 0.15);
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        scroll-behavior: smooth;
      }

      .features__track::-webkit-scrollbar {
        display: none;
      }

      .feature {
        flex: 0 0 min(78vw, 18rem);
        max-height: none;
        scroll-snap-align: start;
      }

      .features__nav {
        display: flex;
      }
    }

    @media (max-height: 720px) and (min-width: 900px) {
      .hero__brand {
        top: clamp(8%, 10vh, 14%);
      }

      .feature {
        max-height: min(14rem, 22vh);
        aspect-ratio: 320 / 260;
        padding: clamp(0.85rem, 1.2vw, 1.15rem);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }

      .reveal__inner {
        transform: none !important;
      }
    }
  </style>
</head>
<body>
  <section class="hero" aria-label="Simões Engenharia & Interiores — destaque">
    <!-- z-index 1: fundo completo -->
    <div class="hero__scene hero__bg" aria-hidden="true">
      <picture>
        <source
          type="image/webp"
          srcset="assets/1-sm.webp 960w, assets/1.webp 1920w"
          sizes="100vw"
        />
        <img
          src="assets/1.png"
          alt=""
          width="1920"
          height="1080"
          decoding="async"
          fetchpriority="high"
        />
      </picture>
    </div>

    <!-- z-index 2: véu de contraste (atrás do texto e da casa) -->
    <div class="hero__veil" aria-hidden="true"></div>

    <!-- z-index 3: tipografia entre as duas imagens -->
    <div class="hero__brand" aria-hidden="true">
      <span class="reveal" style="overflow: visible;">
        <span class="reveal__inner hero__brand-text">Simões</span>
      </span>
    </div>

    <!-- z-index 4: recorte alinhado pixel a pixel com a imagem 1 -->
    <div class="hero__scene hero__fg" aria-hidden="true">
      <picture>
        <source
          type="image/webp"
          srcset="assets/2-sm.webp 960w, assets/2.webp 1920w"
          sizes="100vw"
        />
        <img
          src="assets/2.png"
          alt=""
          width="1920"
          height="1080"
          decoding="async"
          fetchpriority="high"
        />
      </picture>
    </div>

    <header class="header">
      <div class="header__inner">
        <a class="logo" href="#">Simões<span>Engenharia</span></a>

        <nav class="nav" aria-label="Principal">
          <a href="#projetos">Projetos</a>
          <a href="#servicos">Serviços</a>
          <a href="#sobre">Sobre</a>
          <a href="#contato">Contato</a>
        </nav>

        <div class="header__actions">
          <div class="contact">
            <button
              class="contact__trigger"
              type="button"
              aria-expanded="false"
              aria-haspopup="true"
              aria-controls="contact-dropdown"
              data-phone="+551134567890"
            >
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js" defer></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const toggle = document.querySelector(".menu-toggle");
      const mobileNav = document.getElementById("mobile-nav");

      if (toggle && mobileNav) {
        toggle.addEventListener("click", () => {
          const open = toggle.getAttribute("aria-expanded") === "true";
          toggle.setAttribute("aria-expanded", String(!open));
          toggle.setAttribute("aria-label", open ? "Abrir menu" : "Fechar menu");
          mobileNav.classList.toggle("is-open", !open);
        });

        mobileNav.querySelectorAll("a").forEach((link) => {
          link.addEventListener("click", () => {
            toggle.setAttribute("aria-expanded", "false");
            toggle.setAttribute("aria-label", "Abrir menu");
            mobileNav.classList.remove("is-open");
          });
        });
      }

      const contact = document.querySelector(".contact");
      const contactTrigger = document.querySelector(".contact__trigger");
      const contactDropdown = document.getElementById("contact-dropdown");
      const phoneNumber = contactTrigger?.dataset.phone || "+551134567890";

      const isTouchDevice = () =>
        window.matchMedia("(hover: none), (pointer: coarse)").matches ||
        window.matchMedia("(max-width: 899px)").matches;

      const closeContact = () => {
        if (!contactTrigger || !contactDropdown) return;
        contactTrigger.setAttribute("aria-expanded", "false");
        contactDropdown.classList.remove("is-open");
      };

      if (contactTrigger && contactDropdown) {
        contactTrigger.addEventListener("click", (event) => {
          event.stopPropagation();

          if (isTouchDevice()) {
            closeContact();
            window.location.href = `tel:${phoneNumber}`;
            return;
          }

          const open = contactTrigger.getAttribute("aria-expanded") === "true";
          contactTrigger.setAttribute("aria-expanded", String(!open));
          contactDropdown.classList.toggle("is-open", !open);
        });

        document.addEventListener("click", (event) => {
          if (contact && !contact.contains(event.target)) closeContact();
        });

        document.addEventListener("keydown", (event) => {
          if (event.key === "Escape") closeContact();
        });
      }

      const track = document.querySelector(".features__track");
      const prevBtn = document.querySelector(".features__btn--prev");
      const nextBtn = document.querySelector(".features__btn--next");
      const dotsWrap = document.querySelector(".features__dots");
      const cards = track ? Array.from(track.querySelectorAll(".feature")) : [];

      if (track && prevBtn && nextBtn && dotsWrap && cards.length) {
        cards.forEach((_, index) => {
          const dot = document.createElement("button");
          dot.type = "button";
          dot.className = "features__dot" + (index === 0 ? " is-active" : "");
          dot.setAttribute("aria-label", `Ir para o card ${index + 1}`);
          dot.addEventListener("click", () => {
            cards[index].scrollIntoView({ behavior: "smooth", inline: "start", block: "nearest" });
          });
          dotsWrap.appendChild(dot);
        });

        const dots = Array.from(dotsWrap.querySelectorAll(".features__dot"));

        const getStep = () => {
          const card = cards[0];
          const styles = getComputedStyle(track);
          const gap = parseFloat(styles.columnGap || styles.gap) || 0;
          return card.getBoundingClientRect().width + gap;
        };

        const updateControls = () => {
          const maxScroll = track.scrollWidth - track.clientWidth;
          const atStart = track.scrollLeft <= 4;
          const atEnd = track.scrollLeft >= maxScroll - 4;
          prevBtn.disabled = atStart;
          nextBtn.disabled = atEnd;

          const step = getStep() || 1;
          const index = Math.round(track.scrollLeft / step);
          const active = Math.max(0, Math.min(cards.length - 1, index));
          dots.forEach((dot, i) => dot.classList.toggle("is-active", i === active));
        };

        prevBtn.addEventListener("click", () => {
          track.scrollBy({ left: -getStep(), behavior: "smooth" });
        });

        nextBtn.addEventListener("click", () => {
          track.scrollBy({ left: getStep(), behavior: "smooth" });
        });

        track.addEventListener("scroll", () => {
          window.requestAnimationFrame(updateControls);
        }, { passive: true });

        window.addEventListener("resize", updateControls);
        updateControls();
      }

      const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      if (reduceMotion || typeof gsap === "undefined") return;

      gsap.set(".header", { opacity: 0 });
      gsap.set(".hero__fg", { opacity: 0 });
      gsap.set(".btn--solid", { opacity: 0, y: 14 });
      gsap.set(".feature", { opacity: 0, y: 22 });
      gsap.set(".reveal__inner", { yPercent: 110 });

      const tl = gsap.timeline({ defaults: { ease: "power3.out" } });

      tl.to(".header", { opacity: 1, duration: 0.7 }, 0.1)
        .to(".hero__brand .reveal__inner", {
          yPercent: 0,
          duration: 1.25,
          ease: "power4.out",
        }, 0.2)
        .to(".hero__fg", {
          opacity: 1,
          duration: 1.1,
        }, 0.4)
        .to(".hero__title .reveal__inner", {
          yPercent: 0,
          duration: 0.95,
          stagger: 0.12,
        }, 0.55)
        .to(".btn--solid", { opacity: 1, y: 0, duration: 0.65 }, 0.85)
        .to(".feature", {
          opacity: 1,
          y: 0,
          duration: 0.7,
          stagger: 0.08,
        }, 1.0);
    });
  </script>
